<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTomato - Estufa Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>BioTomato 🍅</h1>
        <p>Projeto Agro Forte & Sustentável</p>
    </header>

    <main class="dashboard">
        <section class="cards-container">
            <div class="card">
                <h3>Temperatura</h3>
                <p id="temp-val">--°C</p>
            </div>
            <div class="card">
                <h3>Umidade do Solo</h3>
                <p id="soil-val">--%</p>
            </div>
            <div class="card">
                <h3>Status Irrigação</h3>
                <p id="status-val" class="off">Desligado</p>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="historyChart"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
